# Source weights for the sentiment engine.
#
# Higher weight = more influence on the daily rollup. Tune as observed
# performance evolves. Keys must match the `source` field emitted by each
# fetcher and consumed by aggregator.weighted_rollup.

sentiment_weights:
  sec_filings: 1.0      # SEC EDGAR — regulatory filings, highest signal
  news_finnhub: 0.8     # Finnhub company news
  news_finlight: 0.8    # finlight news API
  social_reddit: 0.4    # r/stocks, r/wallstreetbets, sector subs

# API endpoints / pagination knobs go here once fetchers are wired.
# endpoints:
#   finnhub:
#     base: "https://finnhub.io/api/v1"
#   finlight:
#     base: "https://api.finlight.me"
